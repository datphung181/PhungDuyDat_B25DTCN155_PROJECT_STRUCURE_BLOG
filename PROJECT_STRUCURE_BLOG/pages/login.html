<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style_css/login.css">
    <link rel="stylesheet" href="../style_css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <main id="login-container" class="login-container">
        <section id="illustration-section" class="illustration-section">
            <div id="image-wrapper" class="image-wrapper">
                <img id="login-image" src="../assets/images/draw2.webp.png" alt="Login Illustration">
            </div>
        </section>

        <section id="form-section" class="form-section">
            <div id="social-signin" class="social-signin">
                <span id="social-signin-text">Sign in with</span>
                <div id="social-icons" class="social-icons">
                    <a id="social-fb" href="#" class="icon fb"><i class="fab fa-facebook-f"></i></a>
                    <a id="social-tw" href="#" class="icon tw"><i class="fab fa-twitter"></i></a>
                    <a id="social-ln" href="#" class="icon ln"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>

            <div id="divider" class="divider">
                <span id="divider-text">Or</span>
            </div>

            <form id="login-form">
                <div id="email-group" class="input-group">
                    <input id="email" type="email" placeholder="Enter a valid email address" required>
                    <label id="label-email" for="email">Email address</label>
                </div>

                <div id="password-group" class="input-group">
                    <input id="password" type="password" placeholder="Enter password" required>
                    <label id="label-password" for="password">Password</label>
                </div>

                <button id="login-btn" type="submit" class="login-btn"><a id="index-link" href="../index.html"></a>Login</button>

                <p id="register-text" class="register-text">
                    Don't have an account? <a id="register-link" href="../pages/register.html">Register</a>
                </p>
            </form>
        </section>
    </main>

    <footer id="footer" class="footer">
        <p id="copyright">Copyright © 2025. All rights reserved.</p>
        <div id="footer-icons" class="footer-icons">
            <a id="footer-fb" href="#"><i class="fab fa-facebook-f"></i></a>
            <a id="footer-tw" href="#"><i class="fab fa-twitter"></i></a>
            <a id="footer-gg" href="#"><i class="fab fa-google"></i></a>
            <a id="footer-ln" href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </footer>
<script id="login-script" src="../js/login.js"></script>
</body>
</html>
